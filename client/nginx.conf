server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # config.js should not be cached aggressively — operators may edit it
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
