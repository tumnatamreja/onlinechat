version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghostline
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: ghostline
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: ./server/.env
    volumes:
      - uploads:/app/uploads

  operator:
    build: ./operator
    restart: unless-stopped
    depends_on:
      - server

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - ./client/public/config.js:/usr/share/nginx/html/config.js:ro

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - server
      - client
      - operator
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
  uploads:
